<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tournament Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f4f4f4;
      color: #111;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin: 0 0 10px 0;
    }

    .meta {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .line {
      margin: 4px 0;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .black { color: black; }
    .blue  { color: #2c6fb2; }
    .red   { color: #c0392b; }
    .green { color: #2e8b57; }
    .grey  { color: #ab4705; }

    .bold {
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      color: #555;
    }

    .mono {
      white-space: pre-wrap;
      font-family: Consolas, Menlo, monospace;
      line-height: 1.5;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
      font-size: 13px;
      color: #555;
    }

    .status-pill {
      background: #f0f0f0;
      border-radius: 999px;
      padding: 6px 10px;
    }

    .status-ok {
      color: #1f7a1f;
      font-weight: bold;
    }

    .status-bad {
      color: #b00020;
      font-weight: bold;
    }

    .top-links {
      margin-top: 8px;
      font-size: 14px;
    }

    .top-links a {
      color: #2c6fb2;
      text-decoration: none;
      margin-right: 14px;
    }

    .top-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="title">Tournament Display</h1>
      <div class="meta" id="round"></div>
      <div class="meta" id="points"></div>
      <div class="small" id="generated"></div>

      <div class="status-row">
        <div class="status-pill">Requested file: <span id="requested-file"></span></div>
        <div class="status-pill">Refresh every: <span id="refresh-seconds">5</span>s</div>
        <div class="status-pill">Last fetch: <span id="last-fetch">—</span></div>
        <div class="status-pill">Status: <span id="fetch-status" class="status-ok">Waiting...</span></div>
      </div>

      <div class="top-links">
        <a href="./index.html">Main page</a>
      </div>
    </div>

    <div class="card">
      <h2>Current Round</h2>
      <div id="current-round"></div>
    </div>

    <div class="card">
      <h2>Next-Round Preview</h2>
      <div id="preview" class="mono"></div>
    </div>

    <div class="card">
      <h2>Standings</h2>
      <div id="standings"></div>
    </div>

    <div class="card">
      <h2>Side Pools</h2>
      <div id="side-pools" class="mono"></div>
    </div>
  </div>

  <script>
    const REFRESH_MS = 5000;
    let lastRawJson = null;

    function clearNode(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function renderSegmentLine(parent, lineObj) {
      const row = document.createElement("div");
      row.className = "line";

      if (lineObj.segments) {
        for (const seg of lineObj.segments) {
          const span = document.createElement("span");
          span.textContent = seg.text || "";
          span.classList.add(seg.colour || "black");
          if (seg.bold) span.classList.add("bold");
          row.appendChild(span);
        }
      } else {
        const span = document.createElement("span");
        span.textContent = lineObj.text || "";
        span.classList.add(lineObj.colour || "black");
        if (lineObj.bold) span.classList.add("bold");
        row.appendChild(span);
      }

      parent.appendChild(row);
    }

    function getDisplayFileFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("file") || "current_display.json";
    }

    function getRequestedSource() {
      const params = new URLSearchParams(window.location.search);
      return params.get("source") || "";
    }

    function getDataSource() {
      const requested = getRequestedSource().toLowerCase();

      if (requested === "github") {
        return "github";
      }

      if (requested === "firebase") {
        return "firebase";
      }

      const host = window.location.hostname.toLowerCase();

      if (host.endsWith("github.io")) {
        return "firebase";
      }

      return "local";
    }

    function getDataUrl(file) {
      const source = getDataSource();

      if (source === "firebase") {
        const baseName = file.endsWith(".json") ? file.slice(0, -5) : file;
        return "https://tournament-display-default-rtdb.europe-west1.firebasedatabase.app/live/"
          + encodeURIComponent(baseName)
          + ".json?ts=" + Date.now();
      }

      if (source === "github") {
        return "./display_export/" + encodeURIComponent(file) + "?ts=" + Date.now();
      }

      return "/display_export/" + encodeURIComponent(file) + "?ts=" + Date.now();
    }

    function setFetchStatus(text, ok) {
      const node = document.getElementById("fetch-status");
      node.textContent = text;
      node.className = ok ? "status-ok" : "status-bad";
    }

    function setLastFetchNow() {
      const now = new Date();
      document.getElementById("last-fetch").textContent = now.toLocaleTimeString();
    }

    function renderDisplay(data, file) {
      document.getElementById("title").textContent =
        data.tournament_name || "Tournament Display";

      document.getElementById("round").textContent =
        "Round: " + (data.round_no ?? "?");

      document.getElementById("points").textContent =
        "Points this round: " + (data.points_this_round ?? "");

      const source = getDataSource();

      document.getElementById("generated").textContent =
        data.generated_at
          ? ("Updated: " + data.generated_at + "   |   Source: " + source + "   |   File: " + file)
          : ("Source: " + source + "   |   File: " + file);

      const current = document.getElementById("current-round");
      clearNode(current);
      for (const line of (data.current_round_lines || [])) {
        renderSegmentLine(current, line);
      }

      document.getElementById("preview").textContent =
        data.preview_text || "";

      const standings = document.getElementById("standings");
      clearNode(standings);
      for (const line of (data.standings_lines || [])) {
        renderSegmentLine(standings, line);
      }

      document.getElementById("side-pools").textContent =
        data.side_pools_text || "";
    }

    async function loadDisplay() {
      const file = getDisplayFileFromUrl();
      const source = getDataSource();
      document.getElementById("requested-file").textContent = file + " (" + source + ")";

      try {
        const res = await fetch(getDataUrl(file), {
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const rawText = await res.text();
        const data = JSON.parse(rawText);

        setLastFetchNow();

        if (rawText !== lastRawJson) {
          renderDisplay(data, file);
          lastRawJson = rawText;
          setFetchStatus("Live (updated)", true);
        } else {
          setFetchStatus("Live (no visible change)", true);
        }
      } catch (err) {
        setLastFetchNow();
        setFetchStatus("Load failed", false);

        document.getElementById("preview").textContent =
          "Could not load display data yet.\n\nRequested file: " + file +
          "\n\nSource: " + source +
          "\n\nStart or resume that tournament in the GUI first.\n\nError: " + err.message;
      }
    }

    document.getElementById("refresh-seconds").textContent = String(REFRESH_MS / 1000);

    loadDisplay();
    setInterval(loadDisplay, REFRESH_MS);
  </script>
</body>
</html>
