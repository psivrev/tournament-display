<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tournament Displays</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.wrap{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
}

h1{
    margin-top:0;
}

.event{
    padding:12px;
    border-bottom:1px solid #eee;
}

.event:last-child{
    border-bottom:none;
}

.event a{
    text-decoration:none;
    color:#2c6fb2;
    font-weight:bold;
}

.small{
    color:#666;
    font-size:13px;
}

</style>
</head>


<body>

<div class="wrap">

<div class="card">
<h1>Tournament Displays</h1>
<div class="small">
Live and archived tournament displays.
</div>
</div>


<div class="card">
<h2>Available Events</h2>

<div id="events">
Loading tournaments...
</div>

</div>


<div class="card">
<div class="small">
Display system for backgammon tournaments.
</div>
</div>

</div>



<script>

const repoOwner = "psivrev";
const repoName = "tournament-display";
const folder = "display_export";

async function loadEvents(){

    const url =
    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folder}`;

    const container = document.getElementById("events");

    try{

        const res = await fetch(url);

        if(!res.ok)
            throw new Error("GitHub API error");

        const files = await res.json();

        const jsonFiles =
            files.filter(f => f.name.endsWith(".json"));

        if(jsonFiles.length === 0){
            container.innerHTML = "No tournaments published yet.";
            return;
        }

        container.innerHTML = "";

        jsonFiles
        .sort((a,b)=> b.name.localeCompare(a.name))
        .forEach(file=>{

            const div = document.createElement("div");
            div.className = "event";

            const link = document.createElement("a");
            link.href =
                `display_web.html?file=${encodeURIComponent(file.name)}&source=github`;
            link.textContent = file.name.replace(".json","");

            const meta = document.createElement("div");
            meta.className = "small";
            meta.textContent = "File: " + file.name;

            div.appendChild(link);
            div.appendChild(meta);

            container.appendChild(div);

        });

    }
    catch(err){

        container.innerHTML =
        "Could not load tournament list.";

    }

}

loadEvents();

</script>

</body>
</html>
